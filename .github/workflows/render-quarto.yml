name: Render & Deploy Quarto Site

on:
  push:
    branches: [main]
    paths:
      - '**.qmd'
      - '_quarto.yml'
      - 'styles.css'
      - 'references.bib'
      - '.github/workflows/render-quarto.yml'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R packages
        run: |
          install.packages(c("metafor", "tidyverse", "knitr", "kableExtra"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 'release'

      - name: Render Quarto site
        run: quarto render

      - name: Commit rendered docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Auto-render: update docs [skip ci]"
          git push
